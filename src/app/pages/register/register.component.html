<form (submit)="register(); $event.preventDefault()">
  <h2 class="form-title">Registro</h2>

  <input type="email" [(ngModel)]="email" name="email" placeholder="Correo electrónico" required />
  <input type="password" [(ngModel)]="password" name="password" placeholder="Contraseña" required />

  <button type="submit">Registrarse</button>
  <!--<p *ngIf="successMessage" class="success-message">{{ successMessage }}</p>-->
  <p *ngIf="successMessage" class="success-message">
  {{ successMessage }}<br />
  Serás redirigido al inicio en unos segundos...
</p>

  <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

  <p class="extra-links">
    ¿Ya tienes una cuenta?
    <a [routerLink]="'/login'">Inicia sesión</a><br />
    <a [routerLink]="'/home'">Volver al inicio</a>
  </p>
</form>
